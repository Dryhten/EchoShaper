protect_lexicon:
  description: "专有名词保护：保持指定词条不乱改"
  instruction: >
    如果最终输出中已经出现下列词库词条，请保持其拼写原样不改变；
    对于疑似 ASR 误识别但与这些词条对应的片段，在不破坏语义前提下可替换为对应词条。

auto_structure:
  description: "自动结构化：将长文本整理为可读结构"
  instruction: >
    仅当原始内容中存在明显顺序信号时才进行结构化：
    例如“首先/其次/接着/然后/最后”等顺序词，或“一、二、三”“第一、第二、第三”等编号顺序。
    满足上述条件时，再将内容整理为有序步骤（如“1. ... 2. ... 3. ...”）并合理分段；
    如果不存在明显顺序信号，则不要强行结构化，不要改成步骤或要点列表，尽量保持原文表达。
    全程保持语义准确，不要添加原文没有的信息。

filter_fillers:
  description: "口语过滤：仅移除填充词与明显赘余"
  instruction: >
    仅删除明显的口语填充词与语气词（如“呃”“嗯”“你知道的”“就是”“那个”“然后”“像是”等），
    以及紧邻的、对句意没有贡献的重复短语（例如“X，X”）。
    对于可能是关键信息、技术术语或必要重复的内容要保留。
    尽量保持原句结构与措辞，不要进行大范围改写或重述；不要新增信息。

remove_trailing_period:
  description: "去除输出末尾句号"
  instruction: "最终输出不要以中文句号“。”或英文句号“.”结尾。若末尾出现句号，请移除。"


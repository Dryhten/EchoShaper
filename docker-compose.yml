services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8058}:${BACKEND_PORT:-8058}"
    env_file:
      - ./.env
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8058}
      BACKEND_RELOAD: ${BACKEND_RELOAD:-false}

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8058}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
